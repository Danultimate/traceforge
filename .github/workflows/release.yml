name: Release to PyPI

on:
  push:
    tags:
      - "v*"

# Required for OIDC trust with PyPI's trusted publisher.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,anthropic,openai]"
          pip install build twine

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "Tag: $tag   pyproject version: $ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) does not match pyproject version $ver"
            exit 1
          fi

      - name: Lint
        run: ruff check src/

      - name: Test
        run: pytest -q

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate dists
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dists
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/traceforge-llm
    permissions:
      id-token: write   # required for trusted-publisher OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/

      - name: Publish via PyPI trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
